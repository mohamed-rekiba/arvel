<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="arvel-logo-white-title">
  <title id="arvel-logo-white-title">Arvel logo (white)</title>
  <!-- White peaks on transparent, for dark/colored backgrounds -->
  <!-- Back peak -->
  <path d="M32 16 L50 48 L14 48 Z" fill="white" opacity="0.3"/>
  <!-- Middle peak -->
  <path d="M26 22 L42 48 L10 48 Z" fill="white" opacity="0.6"/>
  <!-- Front peak -->
  <path d="M38 24 L54 48 L22 48 Z" fill="white" opacity="0.95"/>
  <!-- Amber accent base -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#ffc107" stroke-width="2.5" stroke-linecap="round"/>
</svg>
