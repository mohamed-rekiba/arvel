site_name: Arvel
site_description: "Async-first, type-safe Python web framework inspired by Laravel"
site_url: "https://mohamed-rekiba.github.io/arvel/"

repo_name: mohamed-rekiba/arvel
repo_url: "https://github.com/mohamed-rekiba/arvel"

theme:
  name: material
  custom_dir: ../../site/overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github-alt
  logo: img/logo.svg
  favicon: img/favicon.png

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../../../src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: google

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      line_spans: __span
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.blocks.admonition
  - pymdownx.blocks.details
  - pymdownx.blocks.tab:
      alternate_style: true

extra:
  version: 0.1.7 # x-release-please-version
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/mohamed-rekiba/arvel
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/arvel/

extra_css:
  - css/custom.css

