services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arvel_test}
      POSTGRES_USER: ${POSTGRES_USER:-arvel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arvel_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arvel}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mariadb:
    image: mariadb:11-ubi
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-arvel_test}
      MARIADB_USER: ${MARIADB_USER:-arvel}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-arvel_secret}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_secret}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.29
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-arvel_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-arvel_minio_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-arvel_minio} $${MINIO_ROOT_PASSWORD:-arvel_minio_secret};
      mc mb --ignore-existing local/$${MINIO_DEFAULT_BUCKET:-arvel-test};
      exit 0;
      "

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin_secret}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_MANAGEMENT_PORT: "9090"
    ports:
      - "${KC_PORT:-8080}:8080"
      - "${KC_MGMT_PORT:-9090}:9090"
    volumes:
      - ./.docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  keycloak-setup:
    image: python:3.14-alpine
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./.docker/keycloak:/scripts:ro
    environment:
      KC_URL: http://keycloak:8080
      KC_ADMIN: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASS: ${KC_ADMIN_PASSWORD:-admin_secret}
    entrypoint: ["sh", "-c", "apk add --no-cache curl > /dev/null 2>&1 && sh /scripts/setup-realm.sh"]

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-arvel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-arvel_secret}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  mariadb_data:
  valkey_data:
  minio_data:
  rabbitmq_data:
